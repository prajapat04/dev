<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>header+sub-header</title>
   <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>
 <style>
        *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      :root {
        --red: #FF0000;
        --red-dark: #c8101f;
        --input-border: #dde1e7;
        --label-color: #444;
        --placeholder: #aab0ba;
        --tab-inactive: #666;
      }

      body {
        font-family: 'Poppins', sans-serif;
        min-height: 100vh;
        overflow-x: hidden;
      }
  /* ── NAVBAR ── */
      nav {
        position: sticky;
        z-index: 10;
        display: flex;
        top: 0;
        align-items: center;
        justify-content: space-between;
        padding: 0 60px;
        height: 64px;
        background: #fff;
        box-shadow: 0 1px 0 rgba(0, 0, 0, 0.09);
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
        text-decoration: none;
      }

      .logo img {
        height: 34px;
        /* EXACT balanced size */
        width: auto;
        object-fit: contain;
      }

      .links {
        display: flex;
        align-items: center;
        visibility: visible;
      }

      .nav-links {
        display: flex;
        align-items: center;
        gap: 36px;
        list-style: none;
      }

      .nav-links a {
        color: #555;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        transition: color 0.2s;
      }

      .nav-links a:hover {
        color: #111;
      }

      .nav-links .active {
        color: var(--red);
        border-bottom: 2px solid var(--red);
        padding-bottom: 2px;
      }

      /* Login button */
      .btn-login {
        color: #333;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        padding: 8px 16px;
        transition: color 0.2s;
      }

      .btn-login:hover {
        color: var(--red);
      }



      .nav-links>li>a {
        color: #333;
        text-decoration: none;
        font-size: 14px;
        font-weight: 500;
        display: flex;
        align-items: center;
        gap: 5px;
        transition: color 0.2s;
        white-space: nowrap;
      }

      .nav-links>li>a:hover {
        color: var(--red);
      }

      .nav-links>li>a .fa-chevron-down {
        font-size: 10px;
        color: #888;
      }

      /* ── DROPDOWN ── */
      .has-dropdown {
        position: relative;
      }
      .has-dropdown::after {
  content: "";
  position: absolute;
  left: 0;
  top: 100%;
  width: 100%;
  height: 12px;
}

     .dropdown {
  display: none;
  position: absolute;
  top: 100%;
  margin-top: 8px;
  left: 0;
  background: #fff;
  border: 1px solid #eee;
  border-radius: 10px;
  padding: 8px 0;
  min-width: 190px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.10);
  list-style: none;
  z-index: 200;
}

      .dropdown li a {
        display: block;
        padding: 10px 18px;
        font-size: 13.5px;
        color: #333;
        text-decoration: none;
        transition: background 0.15s, color 0.15s;
      }

      .dropdown li a:hover {
        background: #fff5f5;
        color: var(--red);
      }

      .has-dropdown:hover .dropdown {
        display: block;
      }

      /* Arrow rotate on hover */
      .has-dropdown:hover .fa-chevron-down {
        color: var(--red);
        transform: rotate(180deg);
        transition: transform 0.2s;
      }

      /* Nav links spacing */
      .nav-links {
        display: flex;
        align-items: center;
        gap: 28px;
        list-style: none;
      }


      /* ── HAMBURGER ── */
      .hamburger {
        display: none;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 5px;
        width: 36px;
        height: 36px;
        background: none;
        border: none;
        cursor: pointer;
        padding: 4px;
        border-radius: 6px;
        transition: background 0.2s;
        z-index: 100;
      }

      .nav-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }

      /* Desktop pe mobile btn hide */
      .btn-pay-mobile {
        display: none;
      }

      .hamburger:hover {
        background: #f5f5f5;
      }

      .hamburger span {
        display: block;
        width: 22px;
        height: 2px;
        background: #333;
        border-radius: 2px;
        transition: all 0.3s ease;
        transform-origin: center;
      }

      /* Hamburger → X animation */
      .hamburger.open span:nth-child(1) {
        transform: translateY(7px) rotate(45deg);
      }

      .hamburger.open span:nth-child(2) {
        opacity: 0;
        transform: scaleX(0);
      }

      .hamburger.open span:nth-child(3) {
        transform: translateY(-7px) rotate(-45deg);
      }



      /* ── MOBILE MENU ── */
      @media (max-width: 768px) {

        .hamburger {
          display: flex;
        }

        .links {
          position: fixed;
          top: 0;
          right: -100%;
          width: 72%;
          max-width: 280px;
          height: 100vh;
          background: #fff;
          display: flex;
          flex-direction: column;
          align-items: flex-start;
          justify-content: flex-start;
          padding: 80px 28px 40px;
          gap: 8px;
          z-index: 99;
          box-shadow: -8px 0 32px rgba(0, 0, 0, 0.12);
          transition: right 0.35s cubic-bezier(0.4, 0, 0.2, 1);
          visibility: hidden;
          overflow-y: auto;
          /* ← YEH ADD KARO */
          overflow-x: hidden;
          /* ← horizontal scroll rokta hai */
          -webkit-overflow-scrolling: touch;
        }

        .links.open {
          right: 0;
          visibility: visible;
        }

        .btn-pay-desktop {
          display: none;
        }

        .btn-pay-mobile {
          display: block;
          width: 100%;
          margin-left: 0;
          margin-top: 20px;
          text-align: center;
          padding: 13px;
          font-size: 15px;
        }

        .nav-links {
          flex-direction: column;
          align-items: flex-start;
          gap: 0;
          width: 100%;
        }

        .nav-links li {
          width: 100%;
        }

        .nav-links a {
          display: block;
          width: 100%;
          padding: 13px 0;
          font-size: 15px;
          font-weight: 500;
          color: #333;
          border-bottom: 1px solid #f0f0f0;
        }

        .nav-links .active {
          color: var(--red);
          border-bottom: 1px solid #f0f0f0;
          padding-bottom: 13px;
        }

        .nav-links .active::after {
          display: none;
        }

        .btn-pay {
          width: 100%;
          margin-left: 0;
          margin-top: 20px;
          text-align: center;
          padding: 13px;
          font-size: 15px;
        }

        .sub-nav-link.active::after {
          width: calc(100% - 20px);

        }

        .btn-login {
          display: block;
          padding: 13px 0;
          width: 100%;
          color: #333;
          font-size: 15px;
        }

        .has-dropdown .dropdown {
          position: static;
          box-shadow: none;
          border: none;
          border-radius: 0;
          padding: 0 0 0 16px;
          background: #fafafa;
          display: none;
        }

        .has-dropdown.open .dropdown {
          display: block;
        }

        .has-dropdown>a {
          justify-content: space-between;
          width: 100%;
        }
      }

      @media (max-width: 480px) {
        .links {
          width: 80%;
        }
      }


      .btn-pay {
        background: var(--red);
        color: #fff;
        border: none;
        padding: 10px 24px;
        border-radius: 50px;
        font-size: 14px;
        font-weight: 600;
        margin-left: 20px;
        cursor: pointer;
        font-family: 'Poppins', sans-serif;
        transition: background 0.2s, transform 0.15s;
      }

      .btn-pay:hover {
        background: var(--red-dark);
        transform: translateY(-1px);
      }

    /* ── SECONDARY NAV ── */
    .sub-nav {
      position: relative;
      z-index: 9;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #2b2b2b;
      padding: 0 60px;
      height: 44px;
      gap: 0;
    }

    .sub-nav-link {
      color: rgba(255, 255, 255, 0.60);
      text-decoration: none;
      font-size: 16px;
      font-weight: 100;
      padding: 0 60px 0 0;
      height: 44px;
      display: flex;
      align-items: center;
      position: relative;
      transition: color 0.2s;
    }

    .sub-nav-link:hover {
      color: #fff;
    }

    .sub-nav-link.active {
      color: #fff;
      font-weight: 100;
    }

    .sub-nav-link.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: calc(100% - 60px);
      height: 2.5px;
      background: #fff;
      border-radius: 2px 2px 0 0;
    }

 </style>
</head>
<body>
    <!-- NAVBAR -->
   <nav>
  <a href="#" class="logo">
    <img src="/assets/img/itz-logosmall.jpg" alt="ItzeEazy">
  </a>

  <div class="links" id="navLinks">
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="#">About us</a></li>
      <li><a href="#">Blog</a></li>
      <li><a href="#">Pricing</a></li>
      <li class="has-dropdown">
        <a href="#">How to <i class="fa-solid fa-chevron-down"></i></a>
        <ul class="dropdown">
          <li><a href="#">Marriage Registration</a></li>
          <li><a href="#">Passport</a></li>
          <li><a href="#">Aadhar Card</a></li>
          <li><a href="#">Pan Card</a></li>
        </ul>
      </li>
      <li class="has-dropdown">
        <a href="#">Tools <i class="fa-solid fa-chevron-down"></i></a>
        <ul class="dropdown">
          <li><a href="#">Road Tax Calculator</a></li>
          <li><a href="#">Vehicle Search</a></li>
        </ul>
      </li>
      <li><a href="#">Forms</a></li>
    </ul>
    <button class="btn-pay btn-pay-mobile">Sign Up</button>
  </div>

  <div class="nav-right">
    <a href="#" class="btn-login">Login</a>
    <button class="btn-pay btn-pay-desktop">Sign Up</button>
    <button class="hamburger" id="hamburger" onclick="toggleMenu()" aria-label="Toggle menu">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </div>
</nav>

  <!-- SECONDARY NAV -->
    <div class="sub-nav">
      <a href="#" class="sub-nav-link active">Citizen Services</a>
      <a href="#" class="sub-nav-link">Driving School</a>
      <a href="#" class="sub-nav-link">Student Campus (Coming Soon)</a>
    </div>

  <script>
        const tabs = document.querySelectorAll('.tab');
    tabs.forEach(tab => {
      tab.addEventListener('click', () => {
        tabs.forEach(t => { t.classList.remove('active'); t.setAttribute('aria-selected', 'false'); });
        tab.classList.add('active'); tab.setAttribute('aria-selected', 'true');
        document.querySelectorAll('.tab-panel').forEach(p => p.style.display = 'none');
        document.getElementById('panel-' + tab.dataset.tab).style.display = 'block';
        document.getElementById('resultSection').classList.remove('show');
      });
    });

    const searchBtn = document.getElementById('searchBtn');
    const resultSection = document.getElementById('resultSection');

    searchBtn.addEventListener('click', () => {
      const activePanel = document.querySelector('.tab-panel:not([style*="display: none"])');
      const input = activePanel ? activePanel.querySelector('.form-input') : null;
      if (input && input.value.trim() === '') {
        input.style.borderColor = '#e8192c';
        input.style.boxShadow = '0 0 0 3px rgba(232,25,44,0.15)';
        input.focus();
        setTimeout(() => { input.style.borderColor = ''; input.style.boxShadow = ''; }, 2000);
        return;
      }
      searchBtn.classList.add('loading'); searchBtn.disabled = true;
      resultSection.classList.remove('show');
      setTimeout(() => { searchBtn.classList.remove('loading'); searchBtn.disabled = false; resultSection.classList.add('show'); }, 1600);
    });

    document.querySelectorAll('.form-input').forEach(input => {
      input.addEventListener('keydown', e => { if (e.key === 'Enter') searchBtn.click(); });
      input.addEventListener('input', function () {
        const s = this.selectionStart, e = this.selectionEnd;
        this.value = this.value.toUpperCase();
        this.setSelectionRange(s, e);
      });
    });



    function toggleAcc(btn) {
      const item = btn.closest('.acc-item');
      const isOpen = item.classList.contains('open');
      // close all
      document.querySelectorAll('.acc-item').forEach(i => i.classList.remove('open'));
      // open clicked if it was closed
      if (!isOpen) item.classList.add('open');
    }
    function toggleMenu() {
      const hamburger = document.getElementById('hamburger');
      const navLinks = document.getElementById('navLinks');


      hamburger.classList.toggle('open');
      navLinks.classList.toggle('open');


      document.body.style.overflow =
        navLinks.classList.contains('open') ? 'hidden' : '';
    }
    
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', function(e) {
    if (this.closest('.has-dropdown') && window.innerWidth <= 768) {
      return; 
    }

    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');

    hamburger.classList.remove('open');
    navLinks.classList.remove('open');
    document.body.style.overflow = '';
  });
});


// Mobile dropdown toggle
document.querySelectorAll('.has-dropdown > a').forEach(link => {
  link.addEventListener('click', function(e) {
    if (window.innerWidth <= 768) {
      e.preventDefault();
      e.stopPropagation();

      const li = this.closest('.has-dropdown');
      const isOpen = li.classList.contains('open');

      
      document.querySelectorAll('.has-dropdown').forEach(el => {
        el.classList.remove('open');
      });

     
      if (!isOpen) {
        li.classList.add('open');
      }
    }
  });
});

// Close menu on nav link click
document.querySelectorAll('.nav-links a').forEach(link => {
  link.addEventListener('click', function(e) {
    if (this.closest('.has-dropdown') && window.innerWidth <= 768) {
      return;
    }

    const hamburger = document.getElementById('hamburger');
    const navLinks  = document.getElementById('navLinks');

    hamburger.classList.remove('open');
    navLinks.classList.remove('open');
    document.body.style.overflow = '';
  });
});

  </script>
</body>
</html>
