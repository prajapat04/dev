<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Operation Details</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <!-- <link rel="stylesheet"
          href="operation.css"> -->
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Inter, sans-serif;
    }

    body {

      background: #f3f5f7;

    }

    .layout {

      display: flex;

      min-height: 100vh;

    }

    
        /* SIDEBAR */
        .sidebar {
            width: 215px;
            background: #1a1a1a;
            color: #fff;
            padding: 24px 16px;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            z-index: 1000;
        }

        .logo {
            margin-bottom: 32px;
        }

        .logo-title {
            font-size: 18px;
            font-weight: 700;
            margin-bottom: 4px;
        }

        .logo-subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            font-weight: 400;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            margin-bottom: 12px;
        }

        .nav-link {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            border-radius: 10px;
            transition: all 0.3s;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .nav-link:hover {
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
        }

        .nav-link.active {
            background: #fff;
            color: #1a1a1a;
        }

        .nav-icon {
            font-size: 18px;
        }

        /* CONTENT */
        .content {
            margin-left: 215px;
            flex: 1;
            padding: 32px;
            background: #f5f5f5;
        }

    /* Header */

    .page-header {

      display: flex;

      align-items: center;

      gap: 20px;

      margin-bottom: 25px;

    }

    .back-btn {

      background: #111;

      color: #fff;

      border: none;

      padding: 10px 16px;

      border-radius: 8px;

      cursor: pointer;

      font-weight: 600;

    }

    .page-header h1 {

      font-size: 30px;

      font-weight: 800;

    }

    .page-header p {

      margin-top: 4px;

      color: #777;

    }

    /* Empty cards */

    .card {

      background: #fff;

      border-radius: 15px;

      box-shadow: 0 5px 15px rgba(0, 0, 0, .06);

      margin-bottom: 25px;

      overflow: hidden;

      border: 1px solid #e6e6e6;

    }

    .card-header {

      background: #1b1b1b;

      color: #fff;

      padding: 15px 20px;

      font-size: 14px;

      font-weight: 700;

      letter-spacing: .5px;

      text-transform: uppercase;

    }

    .card-body {

      padding: 25px;

    }

    @media(max-width:768px) {

      .sidebar {

        display: none;

      }

      .content {

        margin-left: 0;

        padding: 15px;

      }

      .page-header {

        flex-direction: column;

        align-items: flex-start;

      }

      .page-header h1 {

        font-size: 24px;

      }

    }

    .detail-row {

      display: grid;

      grid-template-columns: 220px 1fr;

      padding: 18px 25px;

      border-bottom: 1px solid #ececec;

      align-items: center;

    }

    .detail-row:last-child {

      border-bottom: none;

    }

    .detail-label {

      font-size: 13px;

      font-weight: 700;

      text-transform: uppercase;

      color: #777;

      letter-spacing: .5px;

    }

    .detail-value {

      font-size: 15px;

      font-weight: 600;

      color: #222;

    }

    .hypercode {

      display: flex;

      align-items: center;

      gap: 15px;

      flex-wrap: wrap;

    }

    .copy-btn {

      background: #111;

      color: #fff;

      border: none;

      padding: 8px 14px;

      border-radius: 8px;

      cursor: pointer;

      font-size: 13px;

      font-weight: 600;

      transition: .3s;

    }

    .copy-btn:hover {

      background: #333;

    }

    @media(max-width:768px) {

      .detail-row {

        grid-template-rows: 1fr;

        gap: 8px;

        padding: 18px;

      }

      .hypercode {

        flex-direction: column;

        align-items: flex-start;

      }

      .copy-btn {

        width: 100%;

      }

    }

    .status-pill {

      display: inline-block;

      padding: 7px 10px;

      border-radius: 30px;

      font-size: 13px;

      font-weight: 700;

    }

    .badge-red {

      background: #ffe5e5;

      color: #d60000;

    }

    .badge-vehicle {

      background: #ffe5e5;
      color: #d60000;
      border: 1px solid rgba(187, 0, 17, 0.10);
      padding: 5px;
      border-radius: 6px;
      width: fit-content;
      font-weight: 700;

    }

    .badge-blue {

      background: #e8f1ff;

      color: #2563eb;

    }

    .badge-green {

      background: #e3f8e8;

      color: #15803d;

    }

    .badge-orange {

      background: #fff2dc;

      color: #b45309;

    }

    .note-box {

      background: #f8f9fb;

      border-left: 4px solid #111;

      padding: 14px 16px;

      border-radius: 10px;

      line-height: 1.7;

      font-size: 14px;

      color: #444;

    }

    @media(max-width:768px) {

      .note-box {

        font-size: 13px;

      }

    }

    .finance-grid {

      display: grid;

      grid-template-columns: repeat(4, 1fr);

      gap: 20px;

      margin-bottom: 30px;

    }

    .finance-box {

      background: #f6f7fb;

      padding: 22px;

      border-radius: 14px;

      border: 1px solid #ececec;

    }

    .finance-title {

      font-size: 13px;

      font-weight: 600;

      color: #777;

      margin-bottom: 10px;

    }

    .finance-value {

      font-size: 28px;

      font-weight: 800;

      color: #222;

    }

    .finance-box.success {

      background: #e8f8ee;

    }

    .finance-box.warning {

      background: #fff4df;

    }

    .finance-box.info {

      background: #edf4ff;

    }

    .progress-section {

      margin-top: 25px;

    }

    .progress-text {

      display: flex;

      justify-content: space-between;

      margin-bottom: 10px;

      font-weight: 600;

    }

    .progress-bar {

      height: 12px;

      background: #ececec;

      border-radius: 20px;

      overflow: hidden;

    }

    .progress-fill {

      height: 100%;

      background: #2563eb;

      border-radius: 20px;

      transition: .4s;

    }

    @media(max-width:992px) {

      .finance-grid {

        grid-template-columns: repeat(2, 1fr);

      }

    }

    @media(max-width:768px) {

      .finance-grid {

        grid-template-columns: 1fr;

      }

      .finance-value {

        font-size: 24px;

      }

    }

    .card-header {

      background: #1b1b1b;

      padding: 14px 18px;

      color: #fff;

    }

    .card-title {

      display: flex;

      align-items: center;

      gap: 10px;

      font-size: 14px;

      font-weight: 700;

      letter-spacing: .5px;

      text-transform: uppercase;

    }

    .card-title svg {

      width: 18px;

      height: 18px;

      stroke-width: 2.2;

      color: #ff3b30;
    }

    .amount{
    font-size:22px;
    font-weight:700;
    color:#222;
}

.payment-date{
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-left:12px;
    color:#777;
    font-size:13px;
    font-weight:500;
}

.payment-date svg{
    width:15px;
    height:15px;
}

.balance-amount{
    color:#ff0000;
    font-size:22px;
    font-weight:700;
}

.pending-badge{

    display:inline-flex;
    align-items:center;
    gap:5px;

    margin-left:12px;

    padding:5px 10px;

    background:#fff1f1;

    border:1px solid #ffd4d4;

    border-radius:6px;

    color:#ff0000;

    font-size:11px;

    font-weight:700;

    text-transform:uppercase;

}

.pending-badge svg{

    width:13px;
    height:13px;

}

@media(max-width:768px){

.payment-date{

    display:flex;

    margin-left:0;

    margin-top:8px;

}

.pending-badge{

    margin-left:0;

    margin-top:10px;

}

.amount,
.balance-amount{

    font-size:18px;

}

}
  </style>
</head>

<body>

  <div class="layout">

    <!-- Sidebar -->

     <aside class="sidebar" id="sidebar">
            <div class="logo">
                <div class="logo-title">Admin Panel</div>
                <div class="logo-subtitle">RTO Operations</div>
            </div>
<ul class="nav-menu">

    <li class="nav-item">
        <a class="nav-link active" onclick="setActive(this)">
            <i data-lucide="layout-dashboard" class="nav-icon"></i>
            <span>Dashboard</span>
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link" onclick="setActive(this)">
            <i data-lucide="file-text" class="nav-icon"></i>
            <span>Applications</span>
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link" onclick="setActive(this)">
            <i data-lucide="credit-card" class="nav-icon"></i>
            <span>Payments</span>
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link" onclick="setActive(this)">
            <i data-lucide="bar-chart-3" class="nav-icon"></i>
            <span>Reports</span>
        </a>
    </li>

    <li class="nav-item">
        <a class="nav-link" onclick="setActive(this)">
            <i data-lucide="settings" class="nav-icon"></i>
            <span>Settings</span>
        </a>
    </li>

</ul>
        </aside>

    <!-- Main -->

    <main class="content">

      <!-- Header -->

      <div class="page-header">

        <button class="back-btn" onclick="history.back()">

          ← Back

        </button>

        <div>

          <h1>Operation Details</h1>

          <p id="operationNo">
            Loading...
          </p>

        </div>

      </div>

      <!-- Vehicle -->

      <div id="vehicleCard"></div>

      <!-- Status -->

      <div id="statusCard"></div>

      <!-- Verification -->

      <div id="verificationCard"></div>

      <!-- Financial -->

      <div id="financialCard"></div>

    </main>

  </div>

  <!-- <script src="operation.js"></script> -->
  <script>
    const params = new URLSearchParams(window.location.search);
    const id = Number(params.get("id"));

    // Dummy Data
    const operations = [
      {
        sr: 10294,
        vehicle: "KA 05 MU 0578",
        hypercode: "BLRRTNO22811",

        status: "Document collected",
        statusColor: "red",

        statusChangeDate: "12 Sept 2025",

        workType: "NOC",

        collectionMode: "Self Pickup",

        receivingDate: "12 Sept 2025",

        completionDate: "Pending",

        dispatchDate: "Not Dispatched",

        documentStatus: "Verified",

        verificationOfficer: "Rahul Sharma",

        remarks: "Original RC and Insurance documents received successfully. Pending owner signature verification.",

        observation: "No discrepancies found during initial document verification.",

        lastUpdated: "22 Sept 2025 10:45 AM",

        quotation: "₹4,500",
        advance: "₹2,000",
        balance: "₹2,500",

        paymentStatus: "Partially Paid",

        paymentMode: "UPI",

        quotation: 4500,

        advance: 2000,

        balance: 2500,

        gst: 810,

        total: 5310,
      }
    ];

    const operation =
      operations.find(item => item.sr === id) || operations[0];

    document.getElementById("operationNo").innerHTML =
      `Operation #${operation.sr}`;

    renderVehicleCard();
    renderStatusCard();
    renderVerificationCard();
    renderFinancialCard();

  function renderVehicleCard() {

    document.getElementById("vehicleCard").innerHTML = `

<div class="card">

    <div class="card-header">

        <div class="card-title">

            <i data-lucide="car-front"></i>

            <span>VEHICLE BASICS</span>

        </div>

    </div>

    <div class="card-body">

        <div class="detail-row">
            <div class="detail-label">SR No.</div>
            <div class="detail-value">${operation.sr}</div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Vehicle Number</div>
            <div class="detail-value badge-vehicle">
                ${operation.vehicle}
            </div>
        </div>

        <div class="detail-row">
            <div class="detail-label">Hypercode</div>
            <div class="detail-value hypercode">
                <span id="hypercodeText">${operation.hypercode}</span>
            </div>
        </div>

    </div>

</div>

`;

}
    function renderStatusCard() {

      let badgeClass = "badge-blue";

      if (operation.statusColor === "red") badgeClass = "badge-red";
      if (operation.statusColor === "green") badgeClass = "badge-green";
      if (operation.statusColor === "orange") badgeClass = "badge-orange";

      document.getElementById("statusCard").innerHTML = `

<div class="card">

<div class="card-header">

   <div class="card-title">

           <i data-lucide="History"></i>

            <span>STATUS & LIFECYCLE</span>

        </div>

    



</div>

<div class="card-body">

<div class="detail-row">

<div class="detail-label">

STATUS

</div>

<div class="detail-value">

<span class="status-pill ${badgeClass}">
${operation.status}
</span>

</div>

</div>

<div class="detail-row">

<div class="detail-label">

WORK TYPE

</div>

<div class="detail-value">

${operation.workType}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

STATUS CHANGE DATE

</div>

<div class="detail-value">

${operation.statusChangeDate}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

COLLECTION MODE

</div>

<div class="detail-value">

${operation.collectionMode}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

DOCUMENT RECEIVING DATE

</div>

<div class="detail-value">

${operation.receivingDate}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

COMPLETION DATE

</div>

<div class="detail-value">

${operation.completionDate}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

DISPATCH DATE

</div>

<div class="detail-value">

${operation.dispatchDate}

</div>

</div>

</div>

</div>

`;

    }

    function copyHypercode() {

      navigator.clipboard.writeText(operation.hypercode);

      const btn = document.querySelector(".copy-btn");

      btn.innerHTML = "✅ Copied";

      setTimeout(() => {

        btn.innerHTML = "📋 Copy";

      }, 1500);

    }

    function renderVerificationCard() {

      document.getElementById("verificationCard").innerHTML = `

<div class="card">

<div class="card-header">

  <div class="card-title">

           <i data-lucide="shield-check"></i>

            <span>VERIFICATION & REMARKS</span>

        </div>

  
 

</div>

<div class="card-body">

<div class="detail-row">

<div class="detail-label">

DOC STATUS
</div>

<div class="detail-value">

<span class="status-pill badge-green">

${operation.documentStatus}

</span>

</div>

</div>

<div class="detail-row">

<div class="detail-label">

REMARKS BY PRASANNA

</div>

<div class="detail-value">

 ${operation.verificationOfficer}

</div>

</div>

<div class="detail-row">

<div class="detail-label">

PRAGATI RESOLUTION

</div>

<div class="detail-value">

<div class="note-box">

${operation.remarks}

</div>

</div>

</div>

<div class="detail-row">

<div class="detail-label">

LIMISHA OBSERVATION

</div>

<div class="detail-value">

<div class="note-box">

${operation.observation}

</div>

</div>

</div>



</div>

`;

    }

function renderFinancialCard() {

document.getElementById("financialCard").innerHTML = `

<div class="card">

    <div class="card-header">

        <div class="card-title">
            <i data-lucide="wallet"></i>
            <span>Financial Summary</span>
        </div>

    </div>

    <div class="card-body">

        <div class="detail-row">

            <div class="detail-label">
                Total Quotation
            </div>

            <div class="detail-value amount">
                ₹ ${operation.quotation.toLocaleString("en-IN")}.00
            </div>

        </div>

        <div class="detail-row">

            <div class="detail-label">
                Advance Amount
            </div>

            <div class="detail-value">

                <strong>
                    ₹ ${operation.advance.toLocaleString("en-IN")}.00
                </strong>

                <span class="payment-date">

                    Paid on Oct 20, 2023

                </span>

            </div>

        </div>

        <div class="detail-row">

            <div class="detail-label">
                Balance Payable
            </div>

            <div class="detail-value">

                <span class="balance-amount">

                    ₹ ${operation.balance.toLocaleString("en-IN")}.00

                </span>

                <span class="pending-badge">


                    Pending

                </span>

            </div>

        </div>

    </div>

</div>

`;

    // Render Lucide icons
    lucide.createIcons();
}


  </script>

  <script src="https://unpkg.com/lucide@latest"></script>
  <script>
    lucide.createIcons();
  </script>
</body>

</html>
